<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CASHGOAL - Prédictions</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        min-height: 100vh;
      }
      .navbar {
        background: rgba(0, 0, 0, 0.8) !important;
        backdrop-filter: blur(10px);
      }
      .container {
        padding: 20px;
      }
      .card {
        background: rgba(255, 255, 255, 0.95);
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        margin-bottom: 20px;
      }
      .match-card {
        cursor: pointer;
        transition: transform 0.2s;
      }
      .match-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
      }
      .btn-ultra {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        transition: transform 0.2s;
      }
      .btn-ultra:hover {
        transform: scale(1.05);
        color: white;
      }
      .loading {
        display: none;
        text-align: center;
        padding: 40px;
      }
      .spinner {
        border: 4px solid #f3f3f3;
        border-top: 4px solid #667eea;
        border-radius: 50%;
        width: 50px;
        height: 50px;
        animation: spin 1s linear infinite;
        margin: 20px auto;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
      .bet-item {
        background: #f8f9fa;
        border-left: 4px solid gold;
        padding: 15px;
        margin: 10px 0;
        border-radius: 5px;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container">
        <a class="navbar-brand" href="/">
          <i class="fas fa-crown"></i> CASHGOAL ULTRA
        </a>
        <div class="navbar-nav ms-auto">
          <a class="nav-link" href="/">Accueil</a>
          <a class="nav-link active" href="/predictions">Prédictions</a>
          <a class="nav-link" href="/api/debug">Debug</a>
        </div>
      </div>
    </nav>

    <div class="container">
      <div class="card p-4">
        <h2 class="text-center mb-4">
          <i class="fas fa-magic"></i> Prédictions de Matchs
        </h2>

        <div class="row">
          <div class="col-md-4">
            <label class="form-label">Compétition</label>
            <select class="form-select" id="competition">
              <option value="FL1">Ligue 1 (France)</option>
              <option value="CL">UEFA Champions League</option>
              <option value="PL">Premier League</option>
              <option value="PD">La Liga</option>
              <option value="SA">Serie A</option>
              <option value="BL1">Bundesliga</option>
            </select>
          </div>
          <div class="col-md-4">
            <label class="form-label">Période</label>
            <select class="form-select" id="days">
              <option value="3">3 prochains jours</option>
              <option value="5">5 prochains jours</option>
              <option value="7">7 prochains jours</option>
            </select>
          </div>
          <div class="col-md-4 d-flex align-items-end">
            <button class="btn btn-ultra w-100" onclick="loadMatches()">
              <i class="fas fa-search"></i> Charger les matchs
            </button>
          </div>
        </div>
      </div>

      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p class="text-white">Analyse en cours...</p>
      </div>

      <div id="matchesSection" style="display: none">
        <div class="card p-4">
          <h3><i class="fas fa-futbol"></i> Matchs disponibles</h3>
          <div class="row" id="matchesList"></div>
        </div>
      </div>

      <div id="predictionSection" style="display: none">
        <div class="card p-4">
          <h3><i class="fas fa-chart-line"></i> Analyse détaillée</h3>
          <div id="predictionContent"></div>
        </div>
      </div>
    </div>

    <script>
      async function loadMatches() {
        const competition = document.getElementById("competition").value;
        const days = document.getElementById("days").value;

        document.getElementById("loading").style.display = "block";
        document.getElementById("matchesSection").style.display = "none";
        document.getElementById("predictionSection").style.display = "none";

        try {
          const response = await fetch("/api/matches", {
            // ✅ Vérifié
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              competition: competition,
              days_ahead: days,
            }),
          });

          // Vérifier si la réponse est du JSON
          const contentType = response.headers.get("content-type");
          if (!contentType || !contentType.includes("application/json")) {
            throw new Error(
              "La réponse n'est pas du JSON. URL peut-être incorrecte.",
            );
          }

          const data = await response.json();

          if (data.success) {
            displayMatches(data.matches);
          } else {
            alert("Erreur: " + data.error);
          }
        } catch (error) {
          console.error("Erreur fetch:", error);
          alert("Erreur de connexion: " + error.message);
        }

        document.getElementById("loading").style.display = "none";
      }

      async function analyzeMatch(matchId) {
        document.getElementById("loading").style.display = "block";
        document.getElementById("predictionSection").style.display = "none";

        try {
          const response = await fetch("/api/analyze-match", {
            // ✅ Vérifié
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ match_id: matchId }),
          });

          // Vérifier si la réponse est du JSON
          const contentType = response.headers.get("content-type");
          if (!contentType || !contentType.includes("application/json")) {
            const text = await response.text();
            console.error("Réponse HTML reçue:", text.substring(0, 200));
            throw new Error(
              "La réponse n'est pas du JSON. URL peut-être incorrecte.",
            );
          }

          const data = await response.json();

          if (data.success) {
            displayPrediction(data);
          } else {
            alert("Erreur: " + data.error);
          }
        } catch (error) {
          console.error("Erreur analyse:", error);
          alert("Erreur lors de l'analyse: " + error.message);
        }

        document.getElementById("loading").style.display = "none";
      }

      function displayMatches(matches) {
        const list = document.getElementById("matchesList");
        list.innerHTML = "";

        if (matches.length === 0) {
          list.innerHTML =
            '<div class="col-12"><p class="text-center">Aucun match trouvé</p></div>';
        } else {
          matches.forEach((match) => {
            const col = document.createElement("div");
            col.className = "col-md-6";
            col.innerHTML = `
                    <div class="card match-card p-3" onclick="analyzeMatch(${match.id})">
                        <h5>${match.home_team} vs ${match.away_team}</h5>
                        <p class="mb-1"><i class="far fa-calendar"></i> ${match.date} à ${match.time}</p>
                        <p class="mb-0"><i class="far fa-building"></i> ${match.competition}</p>
                    </div>
                `;
            list.appendChild(col);
          });
        }

        document.getElementById("matchesSection").style.display = "block";
      }

      function displayPrediction(data) {
        const content = document.getElementById("predictionContent");
        const match = data.match;
        const markets = data.markets;

        let html = `
            <h4 class="text-center mb-4">${match.home_team} vs ${match.away_team}</h4>
            <p class="text-center">📅 ${match.date} à ${match.time} - ${match.competition}</p>
            <p class="text-center"><strong>Confiance globale: ${markets.global_confidence.average}% (${markets.global_confidence.level})</strong></p>
            
            <div class="row mt-4">
                <div class="col-md-4">
                    <div class="card p-3 text-center">
                        <h5>1N2</h5>
                        <p>🏠 ${markets["1N2"].home}%</p>
                        <p>🤝 ${markets["1N2"].draw}%</p>
                        <p>✈️ ${markets["1N2"].away}%</p>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card p-3 text-center">
                        <h5>Double Chance</h5>
                        <p>1N: ${markets.double_chance["1N"]}%</p>
                        <p>N2: ${markets.double_chance["N2"]}%</p>
                        <p>12: ${markets.double_chance["12"]}%</p>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card p-3 text-center">
                        <h5>BTTS</h5>
                        <p>⚽⚽ Oui: ${markets.btts.oui}%</p>
                        <p>🔒 Non: ${markets.btts.non}%</p>
                    </div>
                </div>
            </div>
            
            <div class="row mt-3">
                <div class="col-md-6">
                    <div class="card p-3">
                        <h5>Total de buts</h5>
                        <p>📊 Attendu: ${markets.total_goals.expected}</p>
                        <p>📈 Over 2.5: ${markets.total_goals.over_25}%</p>
                        <p>📉 Under 2.5: ${markets.total_goals.under_25}%</p>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card p-3">
                        <h5>Scores exacts</h5>
        `;

        if (markets.exact_scores) {
          markets.exact_scores.slice(0, 3).forEach((score) => {
            html += `<p>${score.score}: ${score.probability}%</p>`;
          });
        }

        html += `</div></div></div>`;

        if (data.safe_bets && data.safe_bets.length > 0) {
          html += `<h5 class="mt-4">🎯 Paris recommandés</h5>`;
          data.safe_bets.forEach((bet) => {
            html += `
                    <div class="bet-item">
                        <strong>${bet.emoji} ${bet.prediction}</strong><br>
                        Probabilité: ${bet.probability}% (${bet.confidence})<br>
                        <small>${bet.reason || ""}</small>
                    </div>
                `;
          });
        }

        content.innerHTML = html;
        document.getElementById("predictionSection").style.display = "block";
      }
    </script>
  </body>
</html>
